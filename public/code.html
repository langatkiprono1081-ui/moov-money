<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vérifier votre numéro</title>

    <style>
        /* ── reset & base ── */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 400px;
            padding: 32px 20px 28px;
            background: #0a0a0a;
        }

        /* ── titres ── */
        .title {
            font-size: 30px;
            font-weight: 700;
            text-align: left;
            margin-bottom: 6px;
            color: #ffffff;
            letter-spacing: -0.3px;
        }

        .subtitle {
            font-size: 15px;
            color: rgba(255, 255, 255, 0.6);
            text-align: left;
            margin-bottom: 28px;
            font-weight: 400;
            line-height: 1.5;
        }

        .subtitle .phone-highlight {
            color: #ffffff;
            font-weight: 500;
        }

        /* ── champ code ── */
        .code-input-wrap {
            margin-bottom: 28px;
        }

        .code-input-wrap input {
            width: 100%;
            padding: 16px 16px;
            font-size: 20px;
            text-align: center;
            letter-spacing: 8px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            background: rgba(255, 255, 255, 0.04);
            color: #ffffff;
            outline: none;
            transition: border-color 0.25s ease, background 0.25s ease;
            font-weight: 500;
            caret-color: #9A0000;
        }

        .code-input-wrap input::placeholder {
            color: rgba(255, 255, 255, 0.2);
            letter-spacing: 2px;
            font-weight: 400;
        }

        .code-input-wrap input:focus {
            border-color: #9A0000;
            background: rgba(255, 255, 255, 0.06);
        }

        /* ── lien renvoyer + minuteur ── */
        .resend-wrap {
            text-align: center;
            margin-bottom: 32px;
            font-size: 15px;
            color: rgba(255, 255, 255, 0.5);
        }

        .resend-wrap .resend-link {
            color: #9A0000;
            text-decoration: none;
            font-weight: 500;
            cursor: default;
            transition: opacity 0.2s ease;
            pointer-events: none;
        }

        .resend-wrap .resend-link.active {
            cursor: pointer;
            pointer-events: auto;
        }

        .resend-wrap .resend-link.active:hover {
            opacity: 0.75;
            text-decoration: underline;
        }

        .resend-wrap .timer {
            color: rgba(255, 255, 255, 0.5);
            font-weight: 400;
            margin-left: 4px;
        }

        /* ── bouton ── */
        button {
            width: 100%;
            padding: 17px 16px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 10px;
            cursor: default;
            border: none;
            letter-spacing: 0.3px;
            background: #9A0000;
            color: #ffffff;
            transition: background 0.25s ease;
        }

        button:hover {
            background: #7a0000;
        }

        /* ── responsive ── */
        @media (max-width: 440px) {
            .container {
                padding: 24px 16px 24px;
            }
            .title {
                font-size: 26px;
            }
            .subtitle {
                font-size: 14px;
                margin-bottom: 24px;
            }
            .code-input-wrap input {
                font-size: 18px;
                padding: 15px 14px;
                letter-spacing: 6px;
            }
            .resend-wrap {
                font-size: 14px;
            }
            button {
                padding: 15px 16px;
                font-size: 15px;
            }
        }

        @media (max-width: 360px) {
            .title {
                font-size: 22px;
            }
            .subtitle {
                font-size: 13px;
            }
            .code-input-wrap input {
                font-size: 16px;
                padding: 14px 12px;
                letter-spacing: 4px;
            }
            .resend-wrap {
                font-size: 13px;
            }
        }
    </style>
</head>
<body>

    <div class="container">

        <!-- PAS DE LOGO – exactement comme l'image -->

        <div class="title">Vérifier votre numéro</div>
        <div class="subtitle">
            Saisissez le code que nous avons envoyé à
            <span class="phone-highlight">(+226) 79046955</span>
        </div>

        <div class="code-input-wrap">
            <input type="text" placeholder="— — — — — —" maxlength="6" inputmode="numeric" />
        </div>

        <div class="resend-wrap">
            <span class="resend-link" id="resendLink">Renvoyer le code</span>
            <span class="timer" id="timerDisplay">dans 05:00</span>
        </div>

        <button id="continueBtn">Continuer</button>

    </div>

    <script>
        // ── Seul le minuteur (démarre à 5 min) – aucune autre logique ──
        (function() {
            const timerEl = document.getElementById('timerDisplay');
            const resendLink = document.getElementById('resendLink');
            let totalSeconds = 5 * 60; // 5 minutes
            let interval = null;

            function formatTime(sec) {
                const m = String(Math.floor(sec / 60)).padStart(2, '0');
                const s = String(sec % 60).padStart(2, '0');
                return `${m}:${s}`;
            }

            function updateUI() {
                if (totalSeconds <= 0) {
                    timerEl.textContent = '';
                    resendLink.textContent = 'Renvoyer le code';
                    resendLink.classList.add('active');
                    clearInterval(interval);
                    interval = null;
                    return;
                }
                timerEl.textContent = `dans ${formatTime(totalSeconds)}`;
                resendLink.classList.remove('active');
            }

            function startTimer(seconds) {
                if (interval) clearInterval(interval);
                totalSeconds = seconds;
                updateUI();
                interval = setInterval(() => {
                    totalSeconds--;
                    if (totalSeconds <= 0) {
                        totalSeconds = 0;
                        updateUI();
                        clearInterval(interval);
                        interval = null;
                    } else {
                        updateUI();
                    }
                }, 1000);
            }

            // Clic sur "Renvoyer" → relance à 5 min
            resendLink.addEventListener('click', function(e) {
                e.preventDefault();
                if (!resendLink.classList.contains('active')) return;
                startTimer(5 * 60);
            });

            // Démarrage initial à 5 min
            startTimer(5 * 60);
        })();
    </script>

</body>
</html>
