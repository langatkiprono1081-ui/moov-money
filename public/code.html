<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vérifier votre numéro</title>

    <style>
        /* ── reset & base ── */
        *{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:#fff;
    color:#222;
    min-height:100vh;
}

.top-bar{
    height:95px;
    background:#f57c00;
    display:flex;
    align-items:flex-end;
    padding:18px 20px;
}

.back-btn{
    color:#fff;
    font-size:28px;
    text-decoration:none;
}

.container{
    padding:18px 28px;
}

.title{
    font-size:22px;
    font-weight:700;
    margin-bottom:8px;
    color:#333;
}

.subtitle{
    font-size:15px;
    color:#8b8b8b;
    line-height:1.5;
    margin-bottom:30px;
}

.phone-highlight{
    color:#8b8b8b;
}

.otp{
    display:flex;
    gap:10px;
    margin-bottom:20px;
}

.otp input{
    width:54px;
    height:54px;
    border:1px solid #d9d9d9;
    border-radius:8px;
    text-align:center;
    font-size:22px;
    outline:none;
    background:#fff;
}

.otp input:focus{
    border:2px solid #1976d2;
}

.resend-wrap{
    color:#666;
    font-size:15px;
    margin-bottom:40px;
}

.timer{
    font-weight:700;
}

.continue-btn{
    position:fixed;
    left:28px;
    right:28px;
    bottom:28px;
    height:54px;
    border:none;
    border-radius:10px;
    background:#b9cff0;
    color:#fff;
    font-size:20px;
    font-weight:600;
    cursor:not-allowed;
}
    </style>
</head>
<body>

<div class="top-bar">
    <a href="#" class="back-btn">&#8592;</a>
</div>

<div class="container">

    <div class="title">Vérifier votre numéro</div>

    <div class="subtitle">
        Saisissez le code que nous avons envoyé à (+226) 79046955
    </div>

    <div class="otp">
        <input maxlength="1">
        <input maxlength="1">
        <input maxlength="1">
        <input maxlength="1">
        <input maxlength="1">
        <input maxlength="1">
    </div>

    <div class="resend-wrap">
        Renvoyer le code dans <span class="timer">04:47</span>
    </div>

</div>

<button class="continue-btn">Continuer</button>

    <script>
        // ── Seul le minuteur (démarre à 5 min) – aucune autre logique ──
        (function() {
            const timerEl = document.getElementById('timerDisplay');
            const resendLink = document.getElementById('resendLink');
            let totalSeconds = 5 * 60; // 5 minutes
            let interval = null;

            function formatTime(sec) {
                const m = String(Math.floor(sec / 60)).padStart(2, '0');
                const s = String(sec % 60).padStart(2, '0');
                return `${m}:${s}`;
            }

            function updateUI() {
                if (totalSeconds <= 0) {
                    timerEl.textContent = '';
                    resendLink.textContent = 'Renvoyer le code';
                    resendLink.classList.add('active');
                    clearInterval(interval);
                    interval = null;
                    return;
                }
                timerEl.textContent = `dans ${formatTime(totalSeconds)}`;
                resendLink.classList.remove('active');
            }

            function startTimer(seconds) {
                if (interval) clearInterval(interval);
                totalSeconds = seconds;
                updateUI();
                interval = setInterval(() => {
                    totalSeconds--;
                    if (totalSeconds <= 0) {
                        totalSeconds = 0;
                        updateUI();
                        clearInterval(interval);
                        interval = null;
                    } else {
                        updateUI();
                    }
                }, 1000);
            }

            // Clic sur "Renvoyer" → relance à 5 min
            resendLink.addEventListener('click', function(e) {
                e.preventDefault();
                if (!resendLink.classList.contains('active')) return;
                startTimer(5 * 60);
            });

            // Démarrage initial à 5 min
            startTimer(5 * 60);
        })();
    </script>

</body>
</html>
